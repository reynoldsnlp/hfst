name: Build Python wheels

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }} (${{ matrix.archs }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: x86_64
          - os: ubuntu-latest
            archs: aarch64
          - os: macos-13    # x86_64
            archs: auto
          - os: macos-14    # arm64
            archs: auto
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (for aarch64 emulation)
        if: matrix.archs == 'aarch64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.archs }}

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install codegen tools
        run: sudo apt-get -qy update && sudo apt-get -qy install --no-install-recommends bison flex

      - name: Generate parser sources (ship in sdist)
        run: sh python/generate-parsers.sh libhfst/src/parsers

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    # Only publish on a version tag or a GitHub release.
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write   # Trusted Publishing (OIDC) — no stored token needed.
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
